services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aidashboard
      POSTGRES_USER: aidashboard
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://aidashboard:devpassword@db:5432/aidashboard?sslmode=disable"
      JWT_SECRET: "dev-jwt-secret-change-in-prod"
      AI_API_URL: ""
      AI_API_KEY: ""
      AI_MODEL: ""
      CORS_ORIGIN: "http://localhost:3000"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin123"
      MINIO_BUCKET: "aidashboard"
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_ENDPOINT: "http://localhost:9000"
      REPORT_GENERATOR_URL: "http://consumer:8090"
      TZ: "${TZ:-Asia/Shanghai}"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api/v1"
    depends_on:
      - api

  consumer:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://aidashboard:devpassword@db:5432/aidashboard?sslmode=disable"
      AIDASHBOARD_CLAUDE_TIMEOUT: "${AIDASHBOARD_CLAUDE_TIMEOUT:-10m}"
      PORT: "8090"
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - ${HOME}/.claude:/root/.claude
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
