services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aidashboard
      POSTGRES_USER: aidashboard
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://aidashboard:devpassword@db:5432/aidashboard?sslmode=disable"
      JWT_SECRET: "dev-jwt-secret-change-in-prod"
      AI_API_URL: ""
      AI_API_KEY: ""
      AI_MODEL: ""
      AIHUB_HOST: "${AIHUB_HOST}"
      AIHUB_TOKEN: "${AIHUB_TOKEN}"
      AIHUB_SECRET: "${AIHUB_SECRET}"
      AIDA_BOOTSTRAP_ADMIN_UIDS: "${AIDA_BOOTSTRAP_ADMIN_UIDS:-1066}"
      CORS_ORIGIN: "http://localhost:3000,http://192.168.28.113:3000"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin123"
      MINIO_BUCKET: "aidashboard"
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_ENDPOINT: "http://localhost:9000"
      REPORT_GENERATOR_URL: "http://consumer:8090"
      MANAGED_AGENT_URL: "${MANAGED_AGENT_URL:-}"
      MANAGED_AGENT_TOKEN: "${MANAGED_AGENT_TOKEN:-}"
      MANAGED_AGENT_DEFAULT_ENGINE: "${MANAGED_AGENT_DEFAULT_ENGINE:-claude-code}"
      MANAGED_AGENT_DEFAULT_MODEL_ID: "${MANAGED_AGENT_DEFAULT_MODEL_ID:-MiniMax-M2.5}"
      MANAGED_AGENT_REPORT_MCP_SLUG: "${MANAGED_AGENT_REPORT_MCP_SLUG:-aida-report-mcp-p0}"
      MANAGED_AGENT_REPORT_MCP_VERSION: "${MANAGED_AGENT_REPORT_MCP_VERSION:-personal-daily-v1}"
      AIDA_PUBLIC_BASE_URL: "${AIDA_PUBLIC_BASE_URL:-}"
      TZ: "${TZ:-Asia/Shanghai}"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      AIHUB_RUNTIME_CONFIG_apiBaseUrl: "/api/v1"
      AIHUB_RUNTIME_CONFIG_authApiBaseUrl: "/api/v1"
      AIHUB_RUNTIME_CONFIG_userApiBaseUrl: "/api/v1"
      AIHUB_RUNTIME_CONFIG_appTitle: "AIDashboard"
    depends_on:
      - api

  consumer:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://aidashboard:devpassword@db:5432/aidashboard?sslmode=disable"
      AIDA_CLAUDE_TIMEOUT: "${AIDA_CLAUDE_TIMEOUT:-10m}"
      PORT: "8090"
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - ${HOME}/.claude:/root/.claude
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
