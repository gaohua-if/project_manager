<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><div class="logo-mark">AG</div><div><h1>AIcoding 管理平台</h1><p>需求 / 任务 / Session 证据</p></div></div>

      <div class="sidebar-foot">基调：看板只看需求整体；任务树定位执行问题；任务详情维护进度和 session 证据。</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="page-title"><h2>需求管理</h2><p>需求看板看整体状态，任务树处理拆解、依赖、进度和 session 证据。</p></div>
        <div class="top-actions">
          <select class="field" id="roleSelect" title="原型角色视角"><option value="pm">PM / 需求负责人</option><option value="taskOwner">任务负责人</option><option value="readonly">只读成员</option></select>
          <button class="btn" id="expandAllBtn">展开全部</button>
          <button class="btn primary" id="newReqBtn">+ 新建需求</button>
        </div>
      </header>
      <section class="content">
        <div class="metric-strip" id="metricStrip"></div>
        <section class="workspace">
          <div class="workspace-head">
            <div class="workspace-title-row">
              <div class="workspace-title"><h3 id="workspaceTitle">需求看板</h3><p id="workspaceDesc">按阶段查看需求整体推进，卡片只展示聚合进度和证据摘要。</p></div>
              <div class="segmented" id="viewSwitch"><button class="active" data-view="board">需求看板</button><button data-view="tree">任务树</button></div>
            </div>
            <div class="toolbar">
              <input class="field" id="searchInput" placeholder="搜索需求 / 任务 / 负责人 / session 摘要" />
              <select class="field" id="stageFilter"><option value="all">全部阶段</option><option value="待开始">待开始</option><option value="评审">评审</option><option value="进行中">进行中</option><option value="完成">完成</option></select>
              <select class="field" id="riskFilter"><option value="all">全部风险</option><option value="risk">有风险</option><option value="blocked">有阻塞</option><option value="deadline">deadline 风险</option><option value="noSession">无 session 证据</option></select>
              <div></div><button class="btn" id="resetFilters">重置筛选</button>
            </div>
          </div>
          <div class="view-body"><div id="boardView" class="board"></div><div id="treeView" class="tree hide"></div></div>
        </section>
      </section>
    </main>
  </div>

  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="detailDrawer" aria-hidden="true">
    <div class="drawer-head"><div><div class="drawer-kicker" id="drawerKicker">详情</div><h3 id="drawerTitle">对象详情</h3></div><button class="btn icon" id="closeDrawer">×</button></div>
    <div class="drawer-body" id="drawerBody"></div><div class="drawer-footer" id="drawerFooter"></div>
  </aside>

  <div class="modal" id="reqModal"><div class="modal-card" style="width:620px"><div class="modal-head"><h3>新建需求</h3><button class="btn icon" id="closeReqModal">×</button></div><div class="modal-body"><div class="form-grid"><div class="form-row"><label>需求名称</label><input class="field" id="newReqTitle" placeholder="例如：控制台日报任务进展上报" /></div><div class="inline-grid"><div class="form-row"><label>负责人</label><input class="field" id="newReqOwner" placeholder="例如：PM 王悦" /></div><div class="form-row"><label>阶段</label><select class="field" id="newReqStage"><option>待开始</option><option>评审</option><option>进行中</option><option>完成</option></select></div></div><div class="form-row"><label>deadline</label><input class="field" id="newReqDeadline" type="date" /></div><div class="form-row"><label>需求描述</label><textarea class="field" id="newReqDesc" placeholder="补充说明"></textarea></div></div></div><div class="modal-footer"><button class="btn" id="cancelReqCreate">取消</button><button class="btn primary" id="createReqConfirm">创建需求</button></div></div></div>

  <div class="toast" id="toast"></div>

function esc(text){return String(text??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1700);}
function stageClass(s){return s==='待开始'?'todo':s==='评审'?'review':s==='进行中'?'doing':'done';}
function statusClass(s){return s==='待开始'?'todo':s==='进行中'?'doing':s==='待确认'?'review':s==='完成'?'done':s==='阻塞'?'risk':'neutral';}
function roleName(){return state.role==='pm'?'PM / 需求负责人':state.role==='taskOwner'?'任务负责人':'只读成员';}
function canEditRequirement(){return state.role==='pm';}
function canEditTask(task){if(state.role==='pm')return true;if(state.role==='readonly')return false;return task.owner.includes('罗贤');}
function daysLeft(dateStr){if(!dateStr)return null;const d=new Date(dateStr+'T23:59:59');return Math.ceil((d-today)/86400000);}
function deadlineTag(dateStr,done=false){if(!dateStr)return '<span class="tag neutral">无 deadline</span>';const left=daysLeft(dateStr);if(!done&&left<0)return `<span class="tag risk">已超期 ${Math.abs(left)} 天</span>`;if(!done&&left<=3)return `<span class="tag warn">${left} 天后到期</span>`;return `<span class="tag neutral">${dateStr}</span>`;}
function taskMap(req){return new Map(req.tasks.map(t=>[t.id,t]));}
function findTask(taskId){for(const req of requirements){const task=req.tasks.find(t=>t.id===taskId);if(task)return{req,task};}return null;}
function findSession(id){return sessions.find(s=>s.id===id);}
function taskSessions(task){return (task.sessions||[]).map(findSession).filter(Boolean);}
function taskToken(task){return taskSessions(task).reduce((n,s)=>n+s.token,0);}
function formatToken(n){if(n>=1000)return (n/1000).toFixed(n>=10000?1:1)+'k';return String(n);}
function requirementSessions(req){const ids=new Set();req.tasks.forEach(t=>(t.sessions||[]).forEach(id=>ids.add(id)));return [...ids].map(findSession).filter(Boolean);}
function requirementToken(req){return requirementSessions(req).reduce((n,s)=>n+s.token,0);}
function taskDoneCount(req){return req.tasks.filter(t=>t.status==='完成').length;}
function reqProgress(req){return req.tasks.length?Math.round(taskDoneCount(req)/req.tasks.length*100):0;}
function displayStatus(req,task){if(task.status==='完成'||task.status==='取消')return task.status;if(task.manualBlocked)return'阻塞';const map=taskMap(req);const blockedByDep=(task.deps||[]).some(id=>{const dep=map.get(id);return dep&&dep.status!=='完成';});return blockedByDep?'阻塞':task.status;}
function getTaskRisks(req,task){const risks=[];const ds=displayStatus(req,task);if(ds==='阻塞'){const map=taskMap(req);const dep=(task.deps||[]).map(id=>map.get(id)).find(d=>d&&d.status!=='完成');risks.push({type:dep?'依赖未完成':'人工阻塞',level:'high',reason:dep?`等待上游任务「${dep.title}」完成`:(task.blocker||'任务已人工标记阻塞')});}
 const left=daysLeft(task.deadline);if(left!==null&&left<0&&task.status!=='完成')risks.push({type:'deadline 超期',level:'high',reason:`任务 deadline 为 ${task.deadline}`});else if(left!==null&&left<=3&&task.status!=='完成')risks.push({type:'deadline 临近',level:'mid',reason:`${left} 天后到期`});if(!task.ac&&['进行中','待确认','完成'].includes(task.status))risks.push({type:'缺 AC',level:'mid',reason:'任务执行中但缺少验收标准'});return risks;}
function getRequirementRisks(req){const risks=[];if(req.followed&&!req.ac&&req.stage!=='待开始')risks.push({type:'缺需求 AC',level:'mid'});const left=daysLeft(req.deadline);if(left!==null&&left<0&&req.stage!=='完成')risks.push({type:'需求 deadline 超期',level:'high'});else if(left!==null&&left<=3&&req.stage!=='完成')risks.push({type:'需求 deadline 临近',level:'mid'});req.tasks.forEach(t=>getTaskRisks(req,t).forEach(r=>risks.push({...r,taskId:t.id,title:t.title})));return risks;}
function reqSummary(req){const risks=getRequirementRisks(req);return{risks:risks.length,high:risks.filter(r=>r.level==='high').length,blocked:req.tasks.filter(t=>displayStatus(req,t)==='阻塞').length,sessions:requirementSessions(req).length,token:requirementToken(req),noSession:req.tasks.filter(t=>!t.sessions||!t.sessions.length).length};}
function filteredRequirements(){const q=state.search.trim().toLowerCase();return requirements.filter(req=>{if(state.stage!=='all'&&req.stage!==state.stage)return false;const sum=reqSummary(req);const risks=getRequirementRisks(req);if(state.risk==='risk'&&!sum.risks)return false;if(state.risk==='blocked'&&!sum.blocked)return false;if(state.risk==='deadline'&&!risks.some(r=>r.type.includes('deadline')))return false;if(state.risk==='noSession'&&!sum.noSession)return false;if(!q)return true;const sessionBag=requirementSessions(req).map(s=>[s.summary,s.owner,s.tool].join(' ')).join(' ');const bag=[req.title,req.owner,req.desc,req.stage,sessionBag,...req.tasks.flatMap(t=>[t.title,t.owner,t.desc,t.status])].join(' ').toLowerCase();return bag.includes(q);});}
function renderMetrics(){const allTasks=requirements.flatMap(r=>r.tasks.map(t=>({req:r,task:t})));const risks=requirements.flatMap(getRequirementRisks);const blocked=allTasks.filter(x=>displayStatus(x.req,x.task)==='阻塞').length;const sessionCount=new Set(allTasks.flatMap(x=>x.task.sessions||[])).size;const token=allTasks.reduce((n,x)=>n+taskToken(x.task),0);document.getElementById('metricStrip').innerHTML=[['需求总数',requirements.length,'看板按需求阶段流转'],['阻塞任务',blocked,'依赖阻塞 + 人工阻塞'],['当前风险',risks.length,`${risks.filter(r=>r.level==='high').length} 个高风险`],['关联 Session',sessionCount,'作为任务进展证据'],['Session Token',formatToken(token),'仅统计已关联 session']].map(m=>`<div class="metric"><div class="label">${m[0]}</div><div class="value">${m[1]}</div><div class="hint">${m[2]}</div></div>`).join('');}
function render(){document.querySelectorAll('#viewSwitch button').forEach(btn=>btn.classList.toggle('active',btn.dataset.view===state.view));document.getElementById('boardView').classList.toggle('hide',state.view!=='board');document.getElementById('treeView').classList.toggle('hide',state.view!=='tree');document.getElementById('workspaceTitle').textContent=state.view==='board'?'需求看板':'任务树';document.getElementById('workspaceDesc').textContent=state.view==='board'?'看板只展示需求整体阶段、任务完成度、阻塞、session 和 Token 摘要；不在卡片上直接改进度。':'任务树展示需求下的任务进度、上游依赖、Session/Token 摘要；点击任务进入详情维护。';state.view==='board'?renderBoard():renderTree();}
function renderBoard(){renderMetrics();const rows=filteredRequirements();const cols=STAGES.map(stage=>{const items=rows.filter(r=>r.stage===stage);return `<div class="board-col" data-stage="${stage}"><div class="board-head"><div class="board-head-left"><span class="stage-dot ${stageClass(stage)}"></span><span>${stage}</span></div><span class="tag neutral">${items.length}</span></div><div class="drop-zone">${items.map(renderBoardCard).join('')||'<div class="empty">暂无需求</div>'}</div></div>`}).join('');document.getElementById('boardView').innerHTML=`<div class="board-tip"><div><strong>需求看板只负责“看见”。</strong>需求进度来自任务完成聚合；修改任务进度和关联 session 请进入任务详情。</div><div class="risk-stack"><span class="tag doing">任务进度</span><span class="tag cyan">Session 证据</span><span class="tag warn">Token 摘要</span></div></div>${cols}`;}
function renderBoardCard(req){const s=reqSummary(req),p=reqProgress(req);return `<div class="board-card" draggable="true" data-req-id="${req.id}" data-open-req="${req.id}"><div class="card-title-row"><div class="card-title">${esc(req.title)}</div><button class="follow-btn ${req.followed?'on':''}" data-follow-req="${req.id}" title="关注 / 取消关注">★</button></div><div class="card-desc">${esc(req.desc)}</div><div class="card-meta"><span class="tag ${stageClass(req.stage)}">${req.stage}</span>${deadlineTag(req.deadline,req.stage==='完成')}${s.risks?`<span class="tag ${s.high?'risk':'warn'}">风险 ${s.risks}</span>`:'<span class="tag ok">无风险</span>'}${s.blocked?`<span class="tag risk">阻塞 ${s.blocked}</span>`:''}</div><div class="card-progress"><div class="progress-bar" style="--progress:${p}%"><span></span></div><div class="progress-text">${taskDoneCount(req)}/${req.tasks.length}</div></div><div class="card-stats"><div class="stat-pill"><b>${s.sessions}</b><span>Session</span></div><div class="stat-pill"><b>${formatToken(s.token)}</b><span>Token</span></div><div class="stat-pill"><b>${s.noSession}</b><span>无证据任务</span></div></div><div class="card-footer"><span>${esc(req.owner)}</span><span>更新 ${esc(req.updatedAt.slice(5,16))}</span></div></div>`;}
function renderTree(){renderMetrics();const rows=filteredRequirements();document.getElementById('treeView').innerHTML=`<div class="tree-header"><div>需求 / 任务名称</div><div>负责人</div><div>状态</div><div>进度</div><div>deadline</div><div>依赖</div><div>Session/Token</div><div>风险 / 动态</div></div><div class="tree-body">${rows.length?rows.map(renderRequirementTree).join(''):'<div class="empty">没有符合条件的需求</div>'}</div>`;}
function renderRequirementTree(req){const open=state.expanded.has(req.id);const s=reqSummary(req),p=reqProgress(req);const riskTags=s.risks?`<span class="tag ${s.high?'risk':'warn'}">风险 ${s.risks}</span>${s.blocked?`<span class="tag risk">阻塞 ${s.blocked}</span>`:''}`:'<span class="tag ok">正常</span>';const row=`<div class="tree-row requirement ${state.selectedId===req.id?'selected':''}" data-open-req="${req.id}"><div class="node-title" style="--level:0"><span class="indent"></span><button class="toggle ${open?'open':''}" data-toggle="${req.id}"><span>▶</span></button><span class="type-badge req">需求</span><div class="title-text"><div class="title-main"><span class="name">${esc(req.title)}</span></div><div class="title-sub">${esc(req.desc)}</div></div></div><div><span class="owner"><span class="avatar">${esc(req.owner.slice(-2))}</span>${esc(req.owner)}</span></div><div><span class="tag ${stageClass(req.stage)}">${req.stage}</span></div><div><div class="card-progress" style="margin:0"><div class="progress-bar" style="--progress:${p}%"><span></span></div><div class="progress-text">${taskDoneCount(req)}/${req.tasks.length}</div></div></div><div>${deadlineTag(req.deadline,req.stage==='完成')}</div><div><span class="tag neutral">需求聚合</span></div><div class="token-line">${s.sessions} 次 / ${formatToken(s.token)}</div><div class="risk-stack">${riskTags}</div></div>`;if(!open)return row;return row+req.tasks.map(t=>renderTaskRow(req,t)).join('');}
function renderTaskRow(req,task){const ds=displayStatus(req,task);const risks=getTaskRisks(req,task);const depMap=taskMap(req);const deps=task.deps&&task.deps.length?task.deps.map(id=>depMap.get(id)).filter(Boolean).map(d=>`<span class="tag ${d.status==='完成'?'ok':'info'}">${d.status==='完成'?'已就绪':'依赖'}：${esc(d.title.slice(0,8))}</span>`).join(''):'<span class="tag neutral">无</span>';const riskTags=risks.length?risks.slice(0,2).map(r=>`<span class="tag ${r.level==='high'?'risk':'warn'}">${esc(r.type)}</span>`).join(''):'<span class="tag ok">正常</span>';const source=(task.sessions&&task.sessions.length)?'<span class="source-badge">session 证据</span>':'<span class="source-badge">人工填报</span>';return `<div class="tree-row ${state.selectedId===task.id?'selected':''}" data-open-task="${task.id}"><div class="node-title" style="--level:1"><span class="indent"></span><span class="toggle empty"><span>▶</span></span><span class="type-badge task">任务</span><div class="title-text"><div class="title-main"><span class="name">${esc(task.title)}</span></div><div class="title-sub">${esc(task.desc)}</div></div></div><div><span class="owner"><span class="avatar">${esc(task.owner.slice(-2))}</span>${esc(task.owner)}</span></div><div><span class="tag ${statusClass(ds)}">${ds}</span></div><div><div class="card-progress" style="margin:0"><div class="progress-bar" style="--progress:${task.progress}%"><span></span></div><div class="progress-text">${task.progress}%</div></div></div><div>${deadlineTag(task.deadline,task.status==='完成')}</div><div class="dependency">${deps}</div><div class="token-line">${(task.sessions||[]).length} 次 / ${formatToken(taskToken(task))}<br>${source}</div><div class="risk-stack">${riskTags}</div></div>`;}
function openDrawer(){document.getElementById('detailDrawer').classList.add('open');document.getElementById('drawerMask').classList.add('show');}
function closeDrawer(){document.getElementById('detailDrawer').classList.remove('open');document.getElementById('drawerMask').classList.remove('show');state.selectedId=null;render();}
function openRequirement(reqId){const req=requirements.find(r=>r.id===reqId);if(!req)return;state.selectedId=reqId;const s=reqSummary(req),p=reqProgress(req);document.getElementById('drawerKicker').textContent='需求详情 / 聚合视图';document.getElementById('drawerTitle').textContent=req.title;document.getElementById('drawerBody').innerHTML=`<div class="form-grid"><div class="hint-box">需求详情只维护需求基础信息；任务进度、session 证据请进入具体任务详情处理。</div><div class="inline-grid"><div class="form-row"><label>负责人</label><input class="field" id="reqOwnerEdit" value="${esc(req.owner)}" ${canEditRequirement()?'':'disabled'} /></div><div class="form-row"><label>阶段</label><select class="field" id="reqStageEdit" ${canEditRequirement()?'':'disabled'}>${STAGES.map(x=>`<option ${x===req.stage?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="form-row"><label>deadline</label><input class="field" id="reqDeadlineEdit" type="date" value="${esc(req.deadline)}" ${canEditRequirement()?'':'disabled'} /></div><div class="form-row"><label>需求描述</label><textarea class="field" id="reqDescEdit" ${canEditRequirement()?'':'disabled'}>${esc(req.desc)}</textarea></div><div class="form-row"><label>需求 AC</label><textarea class="field" id="reqAcEdit" ${canEditRequirement()?'':'disabled'}>${esc(req.ac||'')}</textarea></div><div class="section-card"><div class="section-head"><h4>需求进度聚合</h4><span class="muted">不可手动编辑</span></div><div class="card-progress"><div class="progress-bar" style="--progress:${p}%"><span></span></div><div class="progress-text">${taskDoneCount(req)}/${req.tasks.length}</div></div><div class="card-stats"><div class="stat-pill"><b>${s.blocked}</b><span>阻塞任务</span></div><div class="stat-pill"><b>${s.sessions}</b><span>Session</span></div><div class="stat-pill"><b>${formatToken(s.token)}</b><span>Token</span></div></div></div><div class="section-card"><div class="section-head"><h4>快速拆分任务</h4><span class="muted">P0 仅需求 + 任务两层</span></div><div class="form-grid"><input class="field" id="newTaskTitle" placeholder="任务名称" ${canEditRequirement()?'':'disabled'} /><div class="inline-grid"><input class="field" id="newTaskOwner" placeholder="负责人，例如 前端 罗贤" ${canEditRequirement()?'':'disabled'} /><input class="field" id="newTaskDeadline" type="date" ${canEditRequirement()?'':'disabled'} /></div><select class="field" id="newTaskDep" ${canEditRequirement()?'':'disabled'}><option value="">无上游依赖</option>${req.tasks.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('')}</select><button class="btn primary" id="addTaskBtn" ${canEditRequirement()?'':'disabled'}>+ 添加到当前需求</button></div></div><div class="section-card"><div class="section-head"><h4>动态记录</h4><span class="muted">进度、session、风险都会沉淀到这里</span></div><div class="activity-list">${renderLogs(req.logs)}</div></div></div>`;document.getElementById('drawerFooter').innerHTML=`<button class="btn" id="drawerFollowReq">${req.followed?'取消关注':'关注需求'}</button><button class="btn primary" id="saveRequirementBtn" ${canEditRequirement()?'':'disabled'}>保存需求</button>`;openDrawer();render();}
function renderLogs(logs){return (logs&&logs.length?logs:['暂无动态']).map((log,i)=>`<div class="activity-item"><div class="activity-dot" style="background:${i===0?'var(--brand)':'#cbd5e1'}"></div><div class="activity-content"><b>${i===0?'最近':''}</b> ${esc(log)}</div></div>`).join('');}
function openTaskDetail(taskId){const found=findTask(taskId);if(!found)return;const {req,task}=found;state.selectedId=taskId;const ds=displayStatus(req,task);const can=canEditTask(task);const taskS=taskSessions(task);document.getElementById('drawerKicker').textContent=`${req.title} / 任务详情`;document.getElementById('drawerTitle').textContent=task.title;const depMap=taskMap(req);const deps=task.deps.length?task.deps.map(id=>depMap.get(id)).filter(Boolean).map(d=>`<span class="tag ${d.status==='完成'?'ok':'info'}">${esc(d.title)} · ${d.status}</span>`).join(''):'<span class="tag neutral">无上游依赖</span>';document.getElementById('drawerBody').innerHTML=`<div class="form-grid"><div class="hint-box">当前角色：${roleName()}。${can?'可维护该任务进度、状态和 session 关联。':'你没有该任务编辑权限，仅可查看；非负责人提交进展可在日报里作为待确认建议。'}</div><div class="section-card"><div class="section-head"><h4>任务基础信息</h4><span class="tag ${statusClass(ds)}">展示状态：${ds}</span></div><div class="form-grid"><div class="form-row"><label>任务名称</label><input class="field" id="taskTitleEdit" value="${esc(task.title)}" ${can?'':'disabled'} /></div><div class="form-row"><label>任务描述</label><textarea class="field" id="taskDescEdit" ${can?'':'disabled'}>${esc(task.desc||'')}</textarea></div><div class="inline-grid"><div class="form-row"><label>负责人</label><input class="field" id="taskOwnerEdit" value="${esc(task.owner)}" ${state.role==='pm'?'':'disabled'} /></div><div class="form-row"><label>工作状态</label><select class="field" id="taskStatusEdit" ${can?'':'disabled'}>${TASK_STATUSES.map(s=>`<option ${s===task.status?'selected':''}>${s}</option>`).join('')}</select></div></div><div class="form-row"><label>deadline</label><input class="field" id="taskDeadlineEdit" type="date" value="${esc(task.deadline)}" ${can?'':'disabled'} /></div><div class="form-row"><label>上游依赖</label><div class="dependency">${deps}</div></div></div></div><div class="section-card"><div class="section-head"><h4>进度更新</h4><span class="muted">状态和进度分开维护</span></div><div class="form-grid"><div><label class="muted">进度档位</label><div class="progress-options" id="progressOptions">${PROGRESS_STEPS.map(p=>`<button class="progress-option ${p===task.progress?'active':''}" data-progress-value="${p}" ${can?'':'disabled'}>${p}%<br><span style="font-size:10px">${progressLabel[p]}</span></button>`).join('')}</div></div><label style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--text2)"><input type="checkbox" id="manualBlockedEdit" ${task.manualBlocked?'checked':''} ${can?'':'disabled'} /> 人工标记阻塞</label><div class="form-row"><label>阻塞 / 更新说明</label><textarea class="field" id="taskBlockerEdit" placeholder="说明本次更新、人工阻塞原因或无 session 进展" ${can?'':'disabled'}>${esc(task.blocker||'')}</textarea></div><div class="form-row"><label>任务级 AC</label><textarea class="field" id="taskAcEdit" ${can?'':'disabled'}>${esc(task.ac||'')}</textarea></div></div></div><div class="section-card"><div class="section-head"><h4>关联 session</h4><button class="btn" id="openSessionPicker" ${can?'':'disabled'}>+ 关联 session</button></div><div class="session-list">${taskS.length?taskS.map(s=>renderSessionItem(s,can)).join(''):'<div class="hint-box">暂无关联 session。该任务仍可通过人工填报更新进度。</div>'}</div></div><div class="section-card"><div class="section-head"><h4>当前风险</h4><span class="muted">自动计算</span></div><div class="risk-stack">${getTaskRisks(req,task).length?getTaskRisks(req,task).map(r=>`<span class="tag ${r.level==='high'?'risk':'warn'}" title="${esc(r.reason)}">${esc(r.type)}</span>`).join(''):'<span class="tag ok">暂无风险</span>'}</div></div><div class="section-card"><div class="section-head"><h4>动态记录</h4><span class="muted">进度 / session / 风险</span></div><div class="activity-list">${renderLogs(task.logs)}</div></div></div>`;document.getElementById('drawerFooter').innerHTML=`<button class="btn" id="drawerFollowTask">${task.followed?'取消关注':'关注任务'}</button><button class="btn primary" id="saveTaskBtn" ${can?'':'disabled'}>保存任务进度</button>`;openDrawer();render();}
function renderSessionItem(s,can){return `<div class="session-item"><div class="session-top"><span>${esc(s.tool)} · ${esc(s.owner)}</span><span>${formatToken(s.token)}</span></div><div class="session-meta">${esc(s.time)}<br>${esc(s.summary)}</div>${can?`<div class="session-actions"><button class="btn danger" data-remove-session="${s.id}">移除关联</button></div>`:''}</div>`;}
function saveRequirement(){const req=requirements.find(r=>r.id===state.selectedId);if(!req||!canEditRequirement())return;req.owner=document.getElementById('reqOwnerEdit').value.trim()||req.owner;req.stage=document.getElementById('reqStageEdit').value;req.deadline=document.getElementById('reqDeadlineEdit').value;req.desc=document.getElementById('reqDescEdit').value.trim();req.ac=document.getElementById('reqAcEdit').value.trim();req.updatedAt='2026-06-23 18:30';req.logs.unshift(`${roleName()}保存了需求基础信息。`);toast('需求已保存');openRequirement(req.id);}
function addTaskToRequirement(){const req=requirements.find(r=>r.id===state.selectedId);if(!req||!canEditRequirement())return;const title=document.getElementById('newTaskTitle').value.trim();if(!title){toast('请输入任务名称');return;}const next=req.tasks.length+1;const id=`task-${req.id.split('-')[1]}-${next}-${Date.now().toString().slice(-3)}`;const dep=document.getElementById('newTaskDep').value;req.tasks.push({id,title,owner:document.getElementById('newTaskOwner').value.trim()||'未分配',status:'待开始',progress:0,deadline:document.getElementById('newTaskDeadline').value,deps:dep?[dep]:[],manualBlocked:false,blocker:'',sessions:[],ac:'',desc:'新拆分任务，待补充描述。',followed:false,logs:[`${roleName()}在需求下拆分了任务。`]});req.updatedAt='2026-06-23 18:30';req.logs.unshift(`新增任务「${title}」。`);toast('已添加任务');openRequirement(req.id);}
function saveTask(){const found=findTask(state.selectedId);if(!found)return;const {req,task}=found;if(!canEditTask(task))return;const oldProgress=task.progress,oldStatus=task.status;task.title=document.getElementById('taskTitleEdit').value.trim()||task.title;task.desc=document.getElementById('taskDescEdit').value.trim();if(state.role==='pm')task.owner=document.getElementById('taskOwnerEdit').value.trim()||task.owner;task.status=document.getElementById('taskStatusEdit').value;task.deadline=document.getElementById('taskDeadlineEdit').value;task.progress=Number(document.querySelector('.progress-option.active')?.dataset.progressValue??task.progress);if(task.status==='完成')task.progress=100;if(task.progress===100)task.status='完成';task.manualBlocked=document.getElementById('manualBlockedEdit').checked;task.blocker=document.getElementById('taskBlockerEdit').value.trim();task.ac=document.getElementById('taskAcEdit').value.trim();const source=(task.sessions&&task.sessions.length)?`session 证据 ${task.sessions.length} 个`:'人工填报';task.logs.unshift(`${roleName()}保存进度：${oldStatus}/${oldProgress}% → ${task.status}/${task.progress}%，来源：${source}。`);req.logs.unshift(`任务「${task.title}」进度更新为 ${task.progress}%。`);req.updatedAt='2026-06-23 18:30';toast('任务进度已保存');openTaskDetail(task.id);}
function toggleFollowReq(reqId){const req=requirements.find(r=>r.id===reqId);if(!req)return;req.followed=!req.followed;toast(req.followed?'已关注需求':'已取消关注需求');render();}
function toggleFollowTask(taskId){const found=findTask(taskId);if(!found)return;found.task.followed=!found.task.followed;toast(found.task.followed?'已关注任务':'已取消关注任务');render();}
function createRequirement(){const title=document.getElementById('newReqTitle').value.trim();if(!title){toast('请先输入需求名称');return;}const id='req-'+(Math.max(...requirements.map(r=>Number(r.id.split('-')[1])))+1);requirements.unshift({id,title,owner:document.getElementById('newReqOwner').value.trim()||'未分配',stage:document.getElementById('newReqStage').value,deadline:document.getElementById('newReqDeadline').value,followed:false,desc:document.getElementById('newReqDesc').value.trim()||'新建需求，待补充描述。',ac:'',updatedAt:'2026-06-23 18:30',logs:['需求已创建，建议继续拆分任务。'],tasks:[]});['newReqTitle','newReqOwner','newReqDeadline','newReqDesc'].forEach(id=>document.getElementById(id).value='');document.getElementById('newReqStage').value='待开始';document.getElementById('reqModal').classList.remove('open');render();toast('需求已创建');}
function openSessionModal(taskId){state.sessionTargetTaskId=taskId;state.sessionSearch='';state.sessionScope='all';document.getElementById('sessionSearch').value='';document.getElementById('sessionScope').value='all';document.getElementById('sessionModal').classList.add('open');renderSessionPickList();}
function renderSessionPickList(){const found=findTask(state.sessionTargetTaskId);if(!found)return;const task=found.task;const q=state.sessionSearch.trim().toLowerCase();const linked=new Set(task.sessions||[]);let list=sessions.filter(s=>{if(state.sessionScope==='mine'&&!s.owner.includes('罗贤'))return false;if(state.sessionScope==='unlinked'&&requirements.some(r=>r.tasks.some(t=>(t.sessions||[]).includes(s.id))))return false;const bag=[s.owner,s.tool,s.time,s.summary].join(' ').toLowerCase();return !q||bag.includes(q);});document.getElementById('sessionPickList').innerHTML=list.length?list.map(s=>`<label class="session-pick"><input type="checkbox" data-pick-session="${s.id}" ${linked.has(s.id)?'checked':''}/><div><div class="session-top"><span>${esc(s.tool)} · ${esc(s.owner)}</span><span>${formatToken(s.token)}</span></div><div class="session-meta">${esc(s.time)}<br>${esc(s.summary)}</div></div><span class="tag ${linked.has(s.id)?'ok':'neutral'}">${linked.has(s.id)?'已关联':'可关联'}</span></label>`).join(''):'<div class="empty">没有符合条件的 session</div>';}
function confirmSessionPick(){const found=findTask(state.sessionTargetTaskId);if(!found)return;const {req,task}=found;const ids=[...document.querySelectorAll('[data-pick-session]:checked')].map(x=>x.dataset.pickSession);task.sessions=Array.from(new Set(ids));task.logs.unshift(`${roleName()}更新关联 session：${task.sessions.length} 个。`);req.logs.unshift(`任务「${task.title}」更新了 session 关联。`);req.updatedAt='2026-06-23 18:30';document.getElementById('sessionModal').classList.remove('open');toast('session 关联已更新');openTaskDetail(task.id);}
function removeTaskSession(sessionId){const found=findTask(state.selectedId);if(!found)return;const {req,task}=found;if(!canEditTask(task))return;task.sessions=(task.sessions||[]).filter(id=>id!==sessionId);task.logs.unshift(`${roleName()}移除了一个 session 关联。`);req.updatedAt='2026-06-23 18:30';toast('已移除关联');openTaskDetail(task.id);}
function bindEvents(){document.getElementById('roleSelect').addEventListener('change',e=>{state.role=e.target.value;toast(`已切换为「${roleName()}」视角`);if(state.selectedId){const found=findTask(state.selectedId);found?openTaskDetail(state.selectedId):openRequirement(state.selectedId);}else render();});document.getElementById('viewSwitch').addEventListener('click',e=>{const btn=e.target.closest('button[data-view]');if(!btn)return;state.view=btn.dataset.view;render();});document.getElementById('searchInput').addEventListener('input',e=>{state.search=e.target.value;render();});document.getElementById('stageFilter').addEventListener('change',e=>{state.stage=e.target.value;render();});document.getElementById('riskFilter').addEventListener('change',e=>{state.risk=e.target.value;render();});document.getElementById('resetFilters').addEventListener('click',()=>{state.search='';state.stage='all';state.risk='all';document.getElementById('searchInput').value='';document.getElementById('stageFilter').value='all';document.getElementById('riskFilter').value='all';render();});document.getElementById('expandAllBtn').addEventListener('click',()=>{const all=requirements.every(r=>state.expanded.has(r.id));requirements.forEach(r=>all?state.expanded.delete(r.id):state.expanded.add(r.id));toast(all?'已收起需求':'已展开需求');render();});document.getElementById('newReqBtn').addEventListener('click',()=>document.getElementById('reqModal').classList.add('open'));document.getElementById('closeReqModal').addEventListener('click',()=>document.getElementById('reqModal').classList.remove('open'));document.getElementById('cancelReqCreate').addEventListener('click',()=>document.getElementById('reqModal').classList.remove('open'));document.getElementById('createReqConfirm').addEventListener('click',createRequirement);document.getElementById('closeDrawer').addEventListener('click',closeDrawer);document.getElementById('drawerMask').addEventListener('click',closeDrawer);document.getElementById('closeSessionModal').addEventListener('click',()=>document.getElementById('sessionModal').classList.remove('open'));document.getElementById('cancelSessionPick').addEventListener('click',()=>document.getElementById('sessionModal').classList.remove('open'));document.getElementById('confirmSessionPick').addEventListener('click',confirmSessionPick);document.getElementById('sessionSearch').addEventListener('input',e=>{state.sessionSearch=e.target.value;renderSessionPickList();});document.getElementById('sessionScope').addEventListener('change',e=>{state.sessionScope=e.target.value;renderSessionPickList();});document.getElementById('resetSessionFilter').addEventListener('click',()=>{state.sessionSearch='';state.sessionScope='all';document.getElementById('sessionSearch').value='';document.getElementById('sessionScope').value='all';renderSessionPickList();});document.body.addEventListener('click',e=>{const followReq=e.target.closest('[data-follow-req]');if(followReq){e.stopPropagation();toggleFollowReq(followReq.dataset.followReq);return;}const followTask=e.target.closest('[data-follow-task]');if(followTask){e.stopPropagation();toggleFollowTask(followTask.dataset.followTask);return;}const toggle=e.target.closest('[data-toggle]');if(toggle){e.stopPropagation();const id=toggle.dataset.toggle;state.expanded.has(id)?state.expanded.delete(id):state.expanded.add(id);render();return;}const prog=e.target.closest('[data-progress-value]');if(prog){e.preventDefault();document.querySelectorAll('.progress-option').forEach(btn=>btn.classList.remove('active'));prog.classList.add('active');return;}const remove=e.target.closest('[data-remove-session]');if(remove){removeTaskSession(remove.dataset.removeSession);return;}if(e.target.closest('#openSessionPicker')){const found=findTask(state.selectedId);if(found)openSessionModal(found.task.id);return;}if(e.target.closest('#saveRequirementBtn')){saveRequirement();return;}if(e.target.closest('#saveTaskBtn')){saveTask();return;}if(e.target.closest('#addTaskBtn')){addTaskToRequirement();return;}if(e.target.closest('#drawerFollowReq')){const req=requirements.find(r=>r.id===state.selectedId);if(req){toggleFollowReq(req.id);openRequirement(req.id);}return;}if(e.target.closest('#drawerFollowTask')){const found=findTask(state.selectedId);if(found){toggleFollowTask(found.task.id);openTaskDetail(found.task.id);}return;}const taskEl=e.target.closest('[data-open-task]');if(taskEl){openTaskDetail(taskEl.dataset.openTask);return;}const reqEl=e.target.closest('[data-open-req]');if(reqEl){openRequirement(reqEl.dataset.openReq);return;}});document.body.addEventListener('dragstart',e=>{const card=e.target.closest('.board-card');if(!card)return;state.draggingReqId=card.dataset.reqId;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});document.body.addEventListener('dragend',e=>{const card=e.target.closest('.board-card');if(card)card.classList.remove('dragging');state.draggingReqId=null;document.querySelectorAll('.board-col').forEach(c=>c.classList.remove('drag-over'));});document.body.addEventListener('dragover',e=>{const col=e.target.closest('.board-col');if(!col)return;e.preventDefault();col.classList.add('drag-over');});document.body.addEventListener('dragleave',e=>{const col=e.target.closest('.board-col');if(col&&!col.contains(e.relatedTarget))col.classList.remove('drag-over');});document.body.addEventListener('drop',e=>{const col=e.target.closest('.board-col');if(!col||!state.draggingReqId)return;e.preventDefault();const req=requirements.find(r=>r.id===state.draggingReqId);if(!req)return;const old=req.stage;req.stage=col.dataset.stage;req.updatedAt='2026-06-23 18:30';req.logs.unshift(`${roleName()}将需求阶段从「${old}」调整为「${req.stage}」。`);col.classList.remove('drag-over');render();toast(old===req.stage?'阶段未变化':`已移动到「${req.stage}」`);});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDrawer();document.getElementById('reqModal').classList.remove('open');document.getElementById('sessionModal').classList.remove('open');}});}
bindEvents();render();
</script>
</body>
</html>
